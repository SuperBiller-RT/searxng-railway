use_default_settings: true
general:
  instance_name: "SearXNG Web"
  debug: false
  donation_url: false
  contact_url: false
  enable_metrics: false
server:
  secret_key: "5xK3pL2vQ7tA4sM8ZcR1YwF6HnU5bE0D"
  limiter: false
  image_proxy: false
  method: "GET"
  default_http_headers:
    X-Content-Type-Options: nosniff
    X-XSS-Protection: 1; mode=block
    X-Robots-Tag: noindex, nofollow
    Referrer-Policy: no-referrer
search:
  safe_search: 0
  default_lang: "en"
  ban_time_on_fail: 2
  max_ban_time_on_fail: 30
  suspended_times:
    SearxEngineAccessDenied: 300
    SearxEngineCaptcha: 300
    SearxEngineTooManyRequests: 60
  formats:
    - json
    - html
ui:
  default_theme: simple
outgoing:
  request_timeout: 6
  max_request_timeout: 10
  pool_connections: 100
  pool_maxsize: 100
  enable_http2: true
  retries: 2
  retry_on_http_error: true
